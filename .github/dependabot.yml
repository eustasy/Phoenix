# eustasy/.Normal 4.0beta3
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # main branch
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gha-patching:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    groups:
      composer-patching:
        update-types:
          - "minor"
          - "patch"
  # 3.x maintenance branch
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "3.x"
    schedule:
      interval: "monthly"
    groups:
      gha-patching:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "composer"
    directory: "/"
    target-branch: "3.x"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "all"
    groups:
      composer-patching:
        update-types:
          - "minor"
          - "patch"
