# eustasy/.Normal 4.0beta9
name: Test (PHP)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.php"]
  pull_request:
    branches: [main]
    paths: ["**.php"]

permissions:
  contents: read

jobs:
  test-php:
    name: PHPUnit + coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4", "8.5", "8.6"]
    services:
      mariadb:
        image: mariadb:11.8@sha256:7974b628cbb4a37c4108d82f1e1d1123d1857ae3d94ab6fb20b8ad8580c271c8
        env:
          MARIADB_ROOT_PASSWORD: phoenix_root
          MARIADB_DATABASE: phoenix
          MARIADB_USER: phoenix
          MARIADB_PASSWORD: phoenix_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure Phoenix for tests
        run: |
          cat > config/phoenix.custom.php <<'EOF'
          <?php
          $settings['db_host']      = '127.0.0.1';
          $settings['db_user']      = 'phoenix';
          $settings['db_pass']      = 'phoenix_pass';
          $settings['db_name']      = 'phoenix';
          $settings['db_prefix']    = 'phoenix_';
          $settings['db_persist']   = false;
          $settings['db_reset']     = false;
          $settings['open_tracker'] = true;
          EOF

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml

      - name: Upload coverage to Qlty
        if: matrix.php-version == '8.6'
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          coverage-token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/clover.xml
