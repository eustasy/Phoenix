# eustasy/.Normal 4.0beta10
name: "Test: PHP"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.php"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml"
      - "phpunit.xml.dist"
      - ".github/workflows/test-php.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.php"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml"
      - "phpunit.xml.dist"
      - ".github/workflows/test-php.yml"

permissions:
  contents: read

jobs:
  test-php:
    name: PHPUnit + coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5", "8.6"]
    services:
      mariadb:
        image: mariadb:12.3.2@sha256:f0b0a2b36cd621f919a7bbbff44d894aa274e3d32feecf032138557a483a6522
        env:
          MARIADB_ROOT_PASSWORD: phoenix_root
          MARIADB_DATABASE: phoenix
          MARIADB_USER: phoenix
          MARIADB_PASSWORD: phoenix_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, gd
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure Phoenix for tests
        run: |
          cat > config/phoenix.custom.php <<'EOF'
          <?php
          $settings['db_host']      = '127.0.0.1';
          $settings['db_user']      = 'phoenix';
          $settings['db_pass']      = 'phoenix_pass';
          $settings['db_name']      = 'phoenix';
          $settings['db_prefix']    = 'phoenix_';
          $settings['db_persist']   = false;
          $settings['db_reset']     = false;
          $settings['open_tracker'] = true;
          EOF

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml

      - name: Upload coverage to Qlty
        if: matrix.php-version == '8.6'
        uses: qltysh/qlty-action/coverage@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
        with:
          coverage-token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/clover.xml
