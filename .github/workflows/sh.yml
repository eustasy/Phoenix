# eustasy/.Normal 4.0beta10
name: "Normal: Shell"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/sh.yml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/sh.yml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  sh:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Lint (shellcheck)
        run: qlty check --all --no-formatters --filter=shellcheck

      - name: Format check (shfmt)
        run: qlty check --all --filter=shfmt
