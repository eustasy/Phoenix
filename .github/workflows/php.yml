# eustasy/.Normal 4.0beta10
name: "Normal: PHP"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**.php"
      - ".github/workflows/php.yml"
      - ".qlty/qlty.toml"
  pull_request:
    branches: [main]
    paths:
      - "**.php"
      - ".github/workflows/php.yml"
      - ".qlty/qlty.toml"

permissions:
  contents: read

jobs:
  php:
    name: Lint + format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5", "8.6"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: gd
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Lint (phpstan)
        run: qlty check --all --no-formatters --filter=phpstan

      - name: Format check (php-cs-fixer)
        run: qlty check --all --filter=php-cs-fixer
