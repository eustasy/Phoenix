name: PHPUnit

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '0 0 * * 1'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  phpunit:
    permissions:
      contents: read
    strategy:
      matrix:
        php-version: [ "8.6", "8.5", "8.4", "8.3", "8.2", ]
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ROOT_PASSWORD: phoenix_root
          MARIADB_DATABASE: phoenix
          MARIADB_USER: phoenix
          MARIADB_PASSWORD: phoenix_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:

    - name: Install PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mysqli
        tools: composer:v2
        coverage: pcov

    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Configure Phoenix for tests
      run: |
        cat > config/phoenix.custom.php <<'EOF'
        <?php
        $settings['db_host']      = '127.0.0.1';
        $settings['db_user']      = 'phoenix';
        $settings['db_pass']      = 'phoenix_pass';
        $settings['db_name']      = 'phoenix';
        $settings['db_prefix']    = 'phoenix_';
        $settings['db_persist']   = false;
        $settings['db_reset']     = false;
        $settings['open_tracker'] = true;
        EOF

    - name: Install Composer dependencies
      run: composer install --no-interaction --no-progress --prefer-dist

    - name: Run PHPUnit
      run: vendor/bin/phpunit --coverage-clover coverage/clover.xml

    - name: Upload Coverage
      if: matrix.php-version == '8.6'
      uses: qltysh/qlty-action/coverage@v2
      with:
        token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        files: coverage/clover.xml