<!-- Magnet Generator body (public/magnet.php). Static markup; included via PHP.
     Behaviour is wired by assets/_magnet.js against the element ids below. -->
<div class="ph-page-title">
	<div>
		<h1>Magnet Generator</h1>
		<p>Drop a <code>.torrent</code> and build a magnet link &mdash; everything runs in your browser, nothing is uploaded.</p>
	</div>
</div>

<label class="ph-drop" id="drop-zone">
	<span class="ph-ico" data-lucide="file-down"></span>
	<span class="ph-drop-title"><strong>Drop a .torrent file here</strong></span>
	<small class="dim">or click to browse</small>
	<input type="file" id="file-input" accept=".torrent">
</label>

<div class="alert alert-danger alert-center" id="error" hidden><span class="ph-ico" data-lucide="circle-alert"></span><span id="error-text"></span></div>

<section id="results" hidden>
	<div class="ph-form-card">
		<div class="ph-field-row">
			<div class="ph-field"><label for="f-xt">xt &mdash; Info Hash</label><input type="text" class="mono" id="f-xt" readonly></div>
			<div class="ph-field"><label for="f-xl">xl &mdash; Size (bytes)</label><input type="number" id="f-xl" min="0"></div>
		</div>
		<div class="ph-field"><label for="f-dn">dn &mdash; Display Name</label><input type="text" id="f-dn"></div>
		<div class="ph-field-row">
			<div class="ph-field"><label for="f-tr">tr &mdash; Trackers (one per line)</label><textarea class="code" id="f-tr" rows="3"></textarea></div>
			<div class="ph-field"><label for="f-ws">ws &mdash; Web Seeds (one per line)</label><textarea class="code" id="f-ws" rows="3"></textarea></div>
		</div>
		<div class="ph-field-row">
			<div class="ph-field"><label for="f-xs">xs &mdash; Exact Source (one per line)</label><textarea class="code" id="f-xs" rows="2"></textarea></div>
			<div class="ph-field"><label for="f-as">as &mdash; Acceptable Source (one per line)</label><textarea class="code" id="f-as" rows="2"></textarea></div>
		</div>
		<div class="ph-field"><label for="f-kt">kt &mdash; Keyword Topic (space-separated)</label><input type="text" id="f-kt"></div>

		<div class="ph-field mb-0">
			<label for="magnet-out">Magnet Link</label>
			<div class="magnet-output-wrap">
				<textarea id="magnet-out" class="magnet-out" readonly rows="4"></textarea>
				<button type="button" class="btn btn-primary btn-sm copy-float" id="copy-btn"><span class="ph-ico" data-lucide="copy"></span>Copy</button>
			</div>
		</div>
	</div>
</section>
